apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-faster-fs.fullname" . }}
  labels:
    {{- include "go-faster-fs.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9010
      targetPort: pprof
      protocol: TCP
      name: pprof
  selector:
    {{- include "go-faster-fs.selectorLabels" . | nindent 4 }}
