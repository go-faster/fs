apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "go-faster-fs.fullname" . }}
  labels:
    {{- include "go-faster-fs.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "go-faster-fs.fullname" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "go-faster-fs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "go-faster-fs.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "go-faster-fs.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/bin/fs
          args:
            - s3
            - --config=/etc/fs/config.yaml
          env:
            - name: USER
              value: "fs"
            # pprof server address
            - name: PPROF_ADDR
              value: "0.0.0.0:9010"
            # OpenTelemetry SDK Configuration
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.telemetry.serviceName | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.telemetry.tracesExporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.telemetry.logsExporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.telemetry.metricsExporter | quote }}
            {{- if .Values.telemetry.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.telemetry.otlpEndpoint | quote }}
            {{- end }}
            {{- if .Values.telemetry.otlpProtocol }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.telemetry.otlpProtocol | quote }}
            {{- end }}
            {{- if .Values.telemetry.resourceAttributes }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.telemetry.resourceAttributes | quote }}
            {{- end }}
            {{- if .Values.telemetry.propagators }}
            - name: OTEL_PROPAGATORS
              value: {{ .Values.telemetry.propagators | quote }}
            {{- end }}
            {{- if .Values.telemetry.logLevel }}
            - name: OTEL_LOG_LEVEL
              value: {{ .Values.telemetry.logLevel | quote }}
            {{- end }}
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: pprof
              containerPort: 9010
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.storage.root }}
            - name: config
              mountPath: /etc/fs
              readOnly: true
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if or (not .Values.persistence.enabled) .Values.persistence.emptyDir }}
        - name: data
          emptyDir: {}
        {{- else if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        - name: config
          configMap:
            name: {{ include "go-faster-fs.fullname" . }}-config
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.emptyDir) (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "go-faster-fs.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}

