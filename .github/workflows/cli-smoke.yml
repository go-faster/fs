name: cli-smoke

# Drives a freshly built fs server with the real S3 command-line clients
# (aws-cli, MinIO mc, s3cmd, rclone) through a bucket/object round-trip over
# edge-case object key names. Gates on every installed client passing.
#
# See scripts/cli-smoke.sh for the matrix itself.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Install S3 CLI clients
        run: |
          set -euo pipefail
          # aws-cli + s3cmd
          pip install --upgrade awscli s3cmd
          # MinIO client (installed as mcli to avoid the Midnight Commander clash).
          # `install` sets ownership+mode in one atomic step (a plain chmod after
          # a root-owned copy fails with "Operation not permitted").
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mcli
          sudo install -m 0755 /tmp/mcli /usr/local/bin/mcli
          # rclone
          curl -fsSL https://downloads.rclone.org/rclone-current-linux-amd64.zip -o /tmp/rclone.zip
          unzip -q /tmp/rclone.zip -d /tmp/rclone
          sudo install -m 0755 /tmp/rclone/rclone-*-linux-amd64/rclone /usr/local/bin/rclone
          # Report versions
          aws --version; mcli --version; s3cmd --version; rclone --version | head -1

      - name: Run CLI smoke matrix
        run: ./scripts/cli-smoke.sh
