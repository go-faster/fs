name: perf

# Enforces the DESIGN.md NFR-3 performance targets as regression gates
# (bench/nfr3_test.go): large-object throughput ≥ 80% of the same machine's
# raw sequential bandwidth, PUT allocations O(1) in object size, and 4 KiB GET
# p99 latency under concurrent load. The throughput gate is a machine-relative
# ratio and the allocation gate is deterministic, so both are stable on shared
# CI runners; the latency gate carries CI headroom and logs the real figure.
#
# `make bench` produces the ns/op / MB/s / allocs numbers for benchstat.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nfr3:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: NFR-3 performance gates
        run: go test ./bench -run NFR3 -v

      - name: Benchmark record (informational)
        run: go test ./bench -run '^$' -bench . -benchmem -count 1
