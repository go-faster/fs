name: perf

# Enforces the DESIGN.md NFR-3 performance targets as regression gates
# (bench/nfr3_test.go): large-object throughput ≥ 80% of the same machine's
# raw sequential bandwidth, PUT allocations O(1) in object size, and 4 KiB GET
# p99 latency under concurrent load. The throughput gate is a machine-relative
# ratio and the allocation gate is deterministic; the latency gate carries
# headroom and logs the real figure. FS_PERF_GATES enables the two wall-clock
# gates (skipped in the general test matrix).
#
# Runs on a dedicated self-hosted runner labeled `bench` so the wall-clock
# numbers and the benchstat record are stable across runs. `make bench`
# reproduces the ns/op / MB/s / allocs numbers locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nfr3:
    # Dedicated benchmark hardware. Same-repo events only: never run untrusted
    # fork-PR code on the self-hosted machine.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, bench]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          # No GitHub-hosted module/build cache: this runner is self-hosted with
          # a persistent local $GOCACHE/$GOMODCACHE that stays warm between runs,
          # and its link to GitHub is slow (~20-30 Mbps), so round-tripping the
          # cache through GitHub's cache service is slower than a warm local one.
          cache: false

      - name: NFR-3 performance gates
        env:
          FS_PERF_GATES: "1"
        run: go test ./bench -run NFR3 -v

      - name: Benchmark record (informational)
        run: go test ./bench -run '^$' -bench . -benchmem -count 6
