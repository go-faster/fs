name: chaos

# Resilience suite: a real multi-node fs cluster as OS processes against an
# embedded etcd, under continuous mixed-scheme (RF2.5/RF3/EC) S3 load.
#
#   - TestChaos (Phase 9): scripted node SIGKILL/restart, disk wipe, node add
#     and etcd restart. Invariants: no acked write lost, no under-protected
#     object after convergence.
#   - TestRollingUpgrade (Phase 10): graceful node-by-node in-place upgrade
#     drill. Invariants: zero failed requests, no data loss, reconvergence
#     between steps.
#
# See chaos/chaos_test.go and chaos/rolling_upgrade_test.go.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run chaos suite
        run: go test -tags chaos -race -v -count=1 -timeout 20m ./chaos
