name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write # needed for signing the images with GitHub OIDC Token **not production ready**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE: ghcr.io/${{ github.repository }}
  DOCKER_CLI_EXPERIMENTAL: "enabled"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # https://goreleaser.com/ci/actions/
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags

      - uses: sigstore/cosign-installer@v4.1.2
      - uses: anchore/sbom-action/download-syft@v0

      # Register QEMU binfmt handlers so buildx can cross-build the arm64 and
      # riscv64 images on the amd64 runner.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # Build the admin dashboard SPA before goreleaser so the released binaries
      # embed the real UI (internal/adminhandler/ui.go go:embed) rather than the
      # placeholder. goreleaser itself does not build it.
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: internal/adminhandler/frontend/package-lock.json

      - name: Build admin dashboard
        working-directory: internal/adminhandler/frontend
        run: |
          npm ci
          npm run build

      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Get Go environment
        id: go-env
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV
          echo "goversion=$(go env GOVERSION)" >> $GITHUB_ENV

      - name: Set up cache
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: release-${{ runner.os }}-go-${{ env.goversion }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            release-${{ runner.os }}-go-${{ env.goversion }}

      - name: ghcr-login
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: goreleaser-install
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true

      - name: goreleaser-release
        # Tags only publish here; PR validation runs the snapshot in
        # release-snapshot.yml.
        run: goreleaser release --clean --timeout 60m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_YES: true
