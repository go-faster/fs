; Configuration for the ceph/s3-tests suite (https://github.com/ceph/s3-tests).
;
; The server currently runs without authentication, so the credentials below
; are arbitrary placeholders — boto3 signs requests with them and the server
; ignores the signatures. The host/port must match how the workflow starts the
; server (see .github/workflows/s3tests.yml).
;
; The IAM / tenant / alt sections are required for the suite to import even
; though the corresponding features are out of scope; they are never exercised
; by the allow-listed tests.

[DEFAULT]
host = localhost
port = 8077
is_secure = False
ssl_verify = False

[fixtures]
bucket prefix = s3tests-{random}-
iam name prefix = s3-tests-
iam path prefix = /s3-tests/

[s3 main]
display_name = M. Tester
user_id = testid
email = tester@example.com
api_name = default
access_key = 0555b35654ad1656d804
secret_key = h7GhxuBLTrlhVUyxSPUKUV8r/2EI4ngqJxD7iBdBYLhwluN30JaT3Q==

[s3 alt]
display_name = john.doe
email = john.doe@example.com
user_id = 56789abcdef0123456789abcdef0123456789abcdef0123456789abcdef01234
access_key = NOPQRSTUVWXYZABCDEFG
secret_key = nopqrstuvwxyzabcdefghijklmnabcdefghijklm

[s3 tenant]
display_name = testx$tenanteduser
user_id = testx$9876543210abcdef0123456789abcdef0123456789abcdef0123456789abcdef
access_key = HIJKLMNOPQRSTUVWXYZA
secret_key = opqrstuvwxyzabcdefghijklmnopqrstuvwxyzab
email = tenanteduser@example.com
tenant = testx

