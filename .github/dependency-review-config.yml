fail_on_severity: 'low'
allow_licenses:
  - 'MIT'
  - 'ISC'
  - 'MPL-2.0'
  - 'BSD-2-Clause'
  - 'BSD-3-Clause'
  - 'Apache-2.0'
# First-party Go packages: BSD-3-Clause plus the standard Go patent grant,
# which scancode reports as an unrecognized LicenseRef. Exempt from the
# license allowlist (some, e.g. x/net, also report no detectable license).
allow_dependencies_licenses:
  - 'pkg:golang/golang.org/x/crypto'
  - 'pkg:golang/golang.org/x/mod'
  - 'pkg:golang/golang.org/x/net'
  - 'pkg:golang/golang.org/x/sync'
  - 'pkg:golang/golang.org/x/sys'
  - 'pkg:golang/golang.org/x/text'
  - 'pkg:golang/golang.org/x/tools'
